<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Wexio Widget — Ember example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {{content-for "head"}}

    <link
      integrity=""
      rel="stylesheet"
      href="{{rootURL}}assets/vendor.css"
    />
    <link
      integrity=""
      rel="stylesheet"
      href="{{rootURL}}assets/wexio-widget-example-ember.css"
    />

    {{content-for "head-footer"}}

    <!--
      Loads the <wexio-widget> custom element runtime. v1.0.24 of
      @wexio/messenger-widget-ember dropped the side-effect import of
      widget.js to fix the ember-cli ESM/CJS clash (require() of pure
      ESM was rejected at package-info-cache scan time). The
      WexioWidgetService now runtime-injects this same script as a
      fallback, but loading it here gets the bundle warm before any
      template renders <wexio-widget>.
    -->
    <script
      type="module"
      src="https://cdn.wexio.io/widget/widget.js"
    ></script>
  </head>
  <body>
    {{content-for "body"}}

    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{rootURL}}assets/wexio-widget-example-ember.js"></script>

    {{content-for "body-footer"}}
  </body>
</html>
